<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Меню</title>
  <script src="https://st.max.ru/js/max-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f13;
      --surface: #1a1a22;
      --surface-2: #22222e;
      --border: rgba(255,255,255,0.07);
      --accent: #7c6af7;
      --accent-light: #a096fa;
      --accent-glow: rgba(124, 106, 247, 0.25);
      --text: #f0eeff;
      --text-muted: #7a7899;
      --text-dim: #4a4868;
      --success: #4ade80;
      --radius: 16px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      height: 100%;
      overscroll-behavior: none;
    }

    body {
      font-family: 'Onest', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: 20px 16px 32px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -120px;
      left: 50%;
      transform: translateX(-50%);
      width: 420px;
      height: 420px;
      background: radial-gradient(circle, rgba(124,106,247,0.18) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .center {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent) 0%, #9c6af7 100%);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 18px 40px;
      font-family: 'Onest', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 4px 24px var(--accent-glow);
      animation: fadeIn 0.4s ease both;
    }

    .btn-primary::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 60%);
    }

    .btn-primary:active {
      transform: scale(0.97);
      box-shadow: 0 2px 12px var(--accent-glow);
    }

    /* Тестовый экран */
    .debug-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      width: 100%;
      max-width: 360px;
      animation: fadeIn 0.3s ease both;
    }

    .debug-card h2 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--accent-light);
    }

    .debug-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }

    .debug-row:last-child {
      border-bottom: none;
    }

    .debug-label {
      font-size: 13px;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .debug-value {
      font-size: 13px;
      color: var(--text);
      font-weight: 500;
      text-align: right;
      word-break: break-all;
    }

    .debug-value.highlight {
      color: var(--success);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="content">
    <div class="center" id="app">
      <!-- Рендерится через JS -->
    </div>
  </div>

  <script>
    if (window.WebApp) {
      window.WebApp.ready();
    }

    // Читаем startapp параметр двумя способами
    function getStartParam() {
      // Способ 1: через WebApp SDK
      const sdkParam = window.WebApp?.initDataUnsafe?.start_param;
      if (sdkParam) return sdkParam;
      // Способ 2: через GET-параметр (фолбек)
      return new URLSearchParams(window.location.search).get('WebAppStartParam') || '';
    }

    function openMenu() {
      if (window.WebApp) {
        window.WebApp.openMaxLink('https://max.ru/foxford_bot?start=/menu');
        window.WebApp.close();
      }
    }

    function render() {
      const param = getStartParam();
      const app = document.getElementById('app');

      if (param === 'test') {
        // Тестовый экран — показываем все данные окружения
        const initData = window.WebApp?.initData || '—';
        const initDataUnsafe = window.WebApp?.initDataUnsafe || {};
        const platform = window.WebApp?.platform || '—';
        const version = window.WebApp?.version || '—';

        app.innerHTML = `
          <div class="debug-card">
            <h2>Debug</h2>
            <div class="debug-row">
              <span class="debug-label">start_param</span>
              <span class="debug-value highlight">${param}</span>
            </div>
            <div class="debug-row">
              <span class="debug-label">platform</span>
              <span class="debug-value">${platform}</span>
            </div>
            <div class="debug-row">
              <span class="debug-label">version</span>
              <span class="debug-value">${version}</span>
            </div>
            <div class="debug-row">
              <span class="debug-label">user.id</span>
              <span class="debug-value">${initDataUnsafe?.user?.id || '—'}</span>
            </div>
            <div class="debug-row">
              <span class="debug-label">user.first_name</span>
              <span class="debug-value">${initDataUnsafe?.user?.first_name || '—'}</span>
            </div>
            <div class="debug-row">
              <span class="debug-label">initData</span>
              <span class="debug-value">${initData.slice(0, 60) || '—'}${initData.length > 60 ? '…' : ''}</span>
            </div>
            <div class="debug-row">
              <span class="debug-label">GET param</span>
              <span class="debug-value">${new URLSearchParams(window.location.search).get('WebAppStartParam') || '—'}</span>
            </div>
          </div>
        `;
      } else {
        // Дефолтный экран (как было)
        app.innerHTML = `
          <button class="btn-primary" onclick="openMenu()">
            Открыть меню бота
          </button>
        `;
      }
    }

    render();
  </script>
</body>
</html>
