<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Меню</title>
  <script src="https://st.max.ru/js/max-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f13;
      --surface: #1a1a22;
      --surface-2: #22222e;
      --border: rgba(255,255,255,0.07);
      --accent: #7c6af7;
      --accent-light: #a096fa;
      --accent-glow: rgba(124, 106, 247, 0.25);
      --text: #f0eeff;
      --text-muted: #7a7899;
      --text-dim: #4a4868;
      --success: #4ade80;
      --radius: 16px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      height: 100%;
      overscroll-behavior: none;
    }

    body {
      font-family: 'Onest', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: 20px 16px 32px;
      position: relative;
      overflow-x: hidden;
    }

    /* Фоновый градиент */
    body::before {
      content: '';
      position: fixed;
      top: -120px;
      left: 50%;
      transform: translateX(-50%);
      width: 420px;
      height: 420px;
      background: radial-gradient(circle, rgba(124,106,247,0.18) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .center {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent) 0%, #9c6af7 100%);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 18px 40px;
      font-family: 'Onest', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 4px 24px var(--accent-glow);
      animation: fadeIn 0.4s ease both;
    }

    .btn-primary::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 60%);
    }

    .btn-primary:active {
      transform: scale(0.97);
      box-shadow: 0 2px 12px var(--accent-glow);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="content">
    <div class="center">
      <button class="btn-primary" onclick="openMenu()">
        Открыть меню бота
      </button>
    </div>
  </div>

  <script>
    // Говорим MAX что апп загрузился
    if (window.WebApp) {
      window.WebApp.ready();
    }

    function openMenu() {
      if (window.WebApp) {
        window.WebApp.openMaxLink('https://max.ru/foxford_bot?startapp=menu');
        window.WebApp.close();
      }
    }
  </script>
</body>
</html>
